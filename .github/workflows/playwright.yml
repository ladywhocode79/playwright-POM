name: Playwright Tests

# Trigger on pushes to main/master.
# Pull request trigger is commented out — uncomment to also run checks on PRs.
on:
  push:
    branches: [ main, master ]
  # pull_request:
  #   branches: [ main, master ]

jobs:
  test:
    # Kill the job if it exceeds 60 minutes to avoid runaway billing
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # Secrets are stored in GitHub → Settings → Secrets and variables → Actions.
    # They are injected as environment variables so tests can read them via process.env.
    # TEST_USERNAME / TEST_PASSWORD must match the keys used in valid_credentials.ts.
    env:
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    # Pin to LTS Node so the version stays stable across runner updates
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # ci installs exact versions from package-lock.json, keeping runs reproducible
    - name: Install dependencies
      run: npm ci

    # --with-deps installs OS-level browser dependencies (fonts, libs) on the runner
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    # Upload the HTML report even if tests fail so failures can be investigated.
    # !cancelled() skips the upload only when the job is manually cancelled,
    # unlike always() which would upload even on cancellation.
    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
